<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TIC TAC TOE — BRUTAL EDITION</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <header class="header">
      <h1 class="title">TIC TAC TOE</h1>
      <p class="subtitle">HUMAN vs MACHINE</p>
    </header>

    <section class="status-bar" aria-live="polite">
      <p id="status" class="status-message">YOUR MOVE, HUMAN.</p>
    </section>

    <section class="board-wrapper">
      <div id="board" class="board" role="grid" aria-label="Tic Tac Toe board">
        <button class="cell" data-index="0" aria-label="Cell 1"></button>
        <button class="cell" data-index="1" aria-label="Cell 2"></button>
        <button class="cell" data-index="2" aria-label="Cell 3"></button>
        <button class="cell" data-index="3" aria-label="Cell 4"></button>
        <button class="cell" data-index="4" aria-label="Cell 5"></button>
        <button class="cell" data-index="5" aria-label="Cell 6"></button>
        <button class="cell" data-index="6" aria-label="Cell 7"></button>
        <button class="cell" data-index="7" aria-label="Cell 8"></button>
        <button class="cell" data-index="8" aria-label="Cell 9"></button>
      </div>
    </section>

    <section class="controls">
      <button id="reset-btn" class="btn btn-reset">NEW GAME</button>
    </section>

    <section class="scoreboard">
      <h2 class="scoreboard-title">SCOREBOARD</h2>
      <div class="score-grid">
        <div class="score-card score-wins">
          <span class="score-label">YOU</span>
          <span id="score-wins" class="score-value">0</span>
        </div>
        <div class="score-card score-draws">
          <span class="score-label">DRAW</span>
          <span id="score-draws" class="score-value">0</span>
        </div>
        <div class="score-card score-losses">
          <span class="score-label">CPU</span>
          <span id="score-losses" class="score-value">0</span>
        </div>
      </div>
    </section>
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
